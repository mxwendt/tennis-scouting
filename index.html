<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- PWA meta tags -->
        <meta name="theme-color" content="#1e40af" />
        <meta
            name="description"
            content="Track your tennis match scores and statistics"
        />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Tennis" />

        <!-- Web App Manifest -->
        <link rel="manifest" href="/manifest.json" />

        <!-- Apple touch icon (iOS home screen) -->
        <link rel="apple-touch-icon" href="/icons/icon-192.png" />

        <!-- Favicon -->
        <link rel="shortcut icon" href="/favicon.svg" />

        <link href="dist/main.css" rel="stylesheet" />
        <title>Tennis Scouting</title>
    </head>
    <body class="m-0 bg-gray-900 text-gray-50 font-sans">
        <div id="app"></div>
        <script src="dist/main.js"></script>
        <script>
            var raw = localStorage.getItem("tennisScoutingState");
            var savedState = null;
            if (raw) {
                try {
                    savedState = JSON.parse(raw);
                } catch (_) {
                    savedState = null;
                }
            }

            var app = Elm.Main.init({
                node: document.getElementById("app"),
                flags: {
                    today: new Date().toISOString().split("T")[0],
                    savedState: savedState,
                },
            });

            app.ports.saveState.subscribe(function (state) {
                try {
                    localStorage.setItem(
                        "tennisScoutingState",
                        JSON.stringify(state),
                    );
                } catch (_) {
                    // Storage quota exceeded or private browsing — fail silently.
                }
            });
        </script>
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("/sw.js")
                        .then((reg) =>
                            console.log("[SW] Registered, scope:", reg.scope),
                        )
                        .catch((err) =>
                            console.error("[SW] Registration failed:", err),
                        );
                });
            }
        </script>
    </body>
</html>

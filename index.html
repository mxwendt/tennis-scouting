<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="dist/main.css" rel="stylesheet" />
        <title>Tennis Scouting</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: #111827;
                color: #f9fafb;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            /* Make the date picker icon visible on dark backgrounds */
            input[type="date"]::-webkit-calendar-picker-indicator {
                filter: invert(0.7);
                cursor: pointer;
            }

            /* Remove default button focus outline in favour of custom styles */
            button:focus-visible {
                outline: 2px solid #fbbf24;
                outline-offset: 2px;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script src="dist/main.js"></script>
        <script>
            var raw = localStorage.getItem("tennisScoutingState");
            var savedState = null;
            if (raw) {
                try {
                    savedState = JSON.parse(raw);
                } catch (_) {
                    savedState = null;
                }
            }

            var app = Elm.Main.init({
                node: document.getElementById("app"),
                flags: {
                    today: new Date().toISOString().split("T")[0],
                    savedState: savedState,
                },
            });

            app.ports.saveState.subscribe(function (state) {
                try {
                    localStorage.setItem(
                        "tennisScoutingState",
                        JSON.stringify(state),
                    );
                } catch (_) {
                    // Storage quota exceeded or private browsing — fail silently.
                }
            });
        </script>
    </body>
</html>
